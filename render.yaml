services:
  - type: web
    name: bagels
    env: python
    pythonVersion: 3.13
    plan: free
    buildCommand: pip install .
    startCommand: bash start.sh
    envVars:
      - key: TTYD_CREDENTIALS
        value: admin:admin
    disk:
      name: bagels-data
      mountPath: /app/data
      size_gb: 1
